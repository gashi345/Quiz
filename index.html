<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Quiz IA - Auto-évaluation</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: linear-gradient(135deg, #f5f7fa, #e4ecf7);
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --soft: #f3f4f6;
      --border: #d1d5db;
      --warning-bg: #fff7ed;
      --warning-border: #fed7aa;
      --warning-text: #9a3412;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .app {
      width: 100%;
      max-width: 850px;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.12);
      padding: 24px;
      width: 100%;
    }

    h1, h2 {
      margin: 0 0 12px 0;
      text-align: center;
      line-height: 1.2;
    }

    p {
      margin: 0;
      line-height: 1.5;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .hidden {
      display: none !important;
    }

    .field {
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      min-height: 52px;
    }

    input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.2);
      border-color: var(--primary);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      min-height: 54px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--primary);
      color: white;
      margin-top: 8px;
    }

    .option {
      background: var(--soft);
      color: var(--text);
      text-align: left;
      margin: 10px 0;
      border: 2px solid transparent;
      white-space: normal;
      word-break: break-word;
      line-height: 1.35;
      padding: 16px;
    }

    .option.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .option:disabled {
      opacity: 0.9;
      cursor: default;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .badge {
      background: var(--soft);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
    }

    .question-box {
      background: #f9fafb;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      margin: 0;
    }

    .timer-wrap {
      margin-bottom: 20px;
    }

    .timer-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #4b5563;
    }

    .timer-bar {
      width: 100%;
      height: 14px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      width: 100%;
      background: var(--primary);
      transition: width 1s linear;
    }

    .info {
      margin-top: 14px;
      padding: 13px 14px;
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: 12px;
      color: var(--warning-text);
      font-size: 14px;
    }

    .small {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .result-box {
      text-align: center;
      background: #f9fafb;
      border-radius: 16px;
      padding: 22px 18px;
      margin-top: 14px;
    }

    .score {
      font-size: 34px;
      font-weight: 700;
      color: var(--primary);
      margin: 10px 0;
    }

    .level {
      font-size: 20px;
      font-weight: 700;
      margin-top: 10px;
      color: #1d4ed8;
    }

    .result-message {
      margin-top: 10px;
      color: #374151;
    }

    @media (max-width: 768px) {
      body {
        align-items: stretch;
        padding: 10px;
      }

      .card {
        min-height: calc(100vh - 20px);
        padding: 18px;
        border-radius: 16px;
      }

      .question-text {
        font-size: 20px;
      }

      .badge {
        width: 100%;
        text-align: center;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 26px;
      }

      h2 {
        font-size: 24px;
      }

      .subtitle,
      .small,
      .info,
      .timer-label,
      .badge {
        font-size: 13px;
      }

      .question-text {
        font-size: 18px;
      }

      .option {
        min-height: 60px;
        font-size: 15px;
        padding: 14px;
      }

      input,
      .primary-btn {
        font-size: 16px;
      }

      .score {
        font-size: 28px;
      }

      .level {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div id="start-screen">
        <h1>Quiz IA - Auto-évaluation</h1>
        <p class="subtitle">Entrez votre prénom et le code de lancement.</p>

        <div class="field">
          <input type="text" id="playerName" placeholder="Votre prénom" maxlength="30" />
        </div>

        <div class="field">
          <input type="password" id="launchCode" placeholder="Code de lancement" maxlength="20" />
        </div>

        <button class="primary-btn" onclick="startQuiz()">Lancer le quiz</button>

        <div class="info">
          Chaque question dure strictement 10 secondes maximum.
        </div>

        <p class="small">Affichage optimisé pour ordinateur et smartphone.</p>
      </div>

      <div id="quiz-screen" class="hidden">
        <div class="top-bar">
          <div class="badge" id="player-badge">Participant :</div>
          <div class="badge" id="progress">Question 1 / 10</div>
        </div>

        <div class="question-box">
          <p class="question-text" id="question">Question</p>
        </div>

        <div class="timer-wrap">
          <div class="timer-label">
            <span>Temps restant</span>
            <span id="timer-text">10 s</span>
          </div>
          <div class="timer-bar">
            <div class="timer-fill" id="timer-fill"></div>
          </div>
        </div>

        <div id="answers"></div>
      </div>

      <div id="end-screen" class="hidden">
        <h2>Quiz terminé</h2>
        <div class="result-box">
          <p id="final-player"></p>
          <div class="score" id="result-score">0 / 10</div>
          <p class="result-message" id="result-message"></p>
          <div class="level" id="result-level"></div>
        </div>
        <button class="primary-btn" onclick="restartQuiz()">Rejouer</button>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_CODE = "QUIZ2026";
    const QUESTION_TIME = 10; // 10 secondes, pas plus

    const quizData = [
      {
        question: "Quand vous utilisez un outil d’IA générative (ChatGPT, Claude, Copilot…), comment formulez-vous votre demande ?",
        options: [
          "Une question simple ou quelques mots.",
          "Une demande structurée avec contexte et objectif.",
          "Un prompt structuré avec rôle, contexte, contraintes et format attendu."
        ],
        correct: 2
      },
      {
        question: "Que signifie le terme “hallucination” dans le contexte de l’IA générative ?",
        options: [
          "Une erreur technique dans l’ordinateur.",
          "Une réponse inventée par le modèle mais présentée comme vraie.",
          "Une incapacité du modèle à répondre."
        ],
        correct: 1
      },
      {
        question: "Comment vérifiez-vous la fiabilité d’une réponse générée par une IA ?",
        options: [
          "Je fais confiance à la réponse.",
          "Je vérifie certaines informations importantes.",
          "Je croise systématiquement avec plusieurs sources ou documents."
        ],
        correct: 2
      },
      {
        question: "Quel est l’effet principal d’un prompt structuré et précis sur un modèle d’IA générative ?",
        options: [
          "Il réduit la puissance de calcul utilisée par le modèle.",
          "Il oriente la probabilité des mots générés en guidant le modèle vers une réponse plus pertinente.",
          "Il augmente la mémoire disponible dans le modèle."
        ],
        correct: 1
      },
      {
        question: "Quelle pratique permet d’améliorer une réponse produite par l’IA ?",
        options: [
          "Reposer la même question.",
          "Reformuler ou préciser le prompt.",
          "Redémarrer l’outil."
        ],
        correct: 1
      },
      {
        question: "Quelle est une limite importante des IA génératives ?",
        options: [
          "Elles ne comprennent pas le contexte.",
          "Elles peuvent produire des informations incorrectes avec assurance.",
          "Elles ne peuvent pas écrire de texte long."
        ],
        correct: 1
      },
      {
        question: "Que signifie l’acronyme LLM dans le domaine de l’intelligence artificielle ?",
        options: [
          "Large Learning Machine.",
          "Large Language Model, un modèle entraîné sur de très grandes quantités de textes.",
          "Logiciel de lecture automatique."
        ],
        correct: 1
      },
      {
        question: "Quel est l’un des enjeux environnementaux liés au développement de l’IA ?",
        options: [
          "La consommation d’énergie et de ressources pour entraîner et faire fonctionner les modèles.",
          "L’utilisation de papier pour imprimer les réponses.",
          "La fabrication de claviers spécifiques."
        ],
        correct: 0
      },
      {
        question: "Qu’est-ce qu’un “prompt” dans l’utilisation d’une IA générative ?",
        options: [
          "Un logiciel qui crée de l’intelligence artificielle.",
          "L’instruction ou la demande formulée à l’IA pour générer une réponse.",
          "Un algorithme utilisé pour entraîner le modèle."
        ],
        correct: 1
      },
      {
        question: "Que signifie le terme “biais” dans un système d’intelligence artificielle ?",
        options: [
          "Une erreur informatique aléatoire.",
          "Une tendance du modèle à produire des résultats influencés par les données d’entraînement ou par des stéréotypes.",
          "Une limite liée à la vitesse de calcul."
        ],
        correct: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let playerName = "";
    let selectedAnswer = null;
    let timeLeft = QUESTION_TIME;
    let timerInterval = null;
    let answerLocked = false;

    function startQuiz() {
      const nameInput = document.getElementById("playerName").value.trim();
      const codeInput = document.getElementById("launchCode").value.trim();

      if (!nameInput) {
        alert("Veuillez saisir votre prénom.");
        return;
      }

      if (codeInput !== ADMIN_CODE) {
        alert("Code de lancement incorrect.");
        return;
      }

      playerName = nameInput;
      currentQuestion = 0;
      score = 0;

      document.getElementById("start-screen").classList.add("hidden");
      document.getElementById("end-screen").classList.add("hidden");
      document.getElementById("quiz-screen").classList.remove("hidden");
      document.getElementById("player-badge").textContent = "Participant : " + playerName;

      showQuestion();
    }

    function showQuestion() {
      clearInterval(timerInterval);
      selectedAnswer = null;
      answerLocked = false;
      timeLeft = QUESTION_TIME;

      const q = quizData[currentQuestion];
      document.getElementById("question").textContent = q.question;
      document.getElementById("progress").textContent = `Question ${currentQuestion + 1} / ${quizData.length}`;

      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = "";

      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = option;
        btn.onclick = () => selectAnswer(index, btn);
        answersDiv.appendChild(btn);
      });

      updateTimerUI();
      startTimer();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          timeLeft = 0;
          updateTimerUI();
          submitCurrentAnswer();
        }
      }, 1000);
    }

    function updateTimerUI() {
      document.getElementById("timer-text").textContent = `${timeLeft} s`;
      const percentage = Math.max((timeLeft / QUESTION_TIME) * 100, 0);
      document.getElementById("timer-fill").style.width = percentage + "%";
    }

    function selectAnswer(index, buttonElement) {
      if (answerLocked) return;

      answerLocked = true;
      selectedAnswer = index;
      clearInterval(timerInterval);

      document.querySelectorAll(".option").forEach(btn => {
        btn.disabled = true;
        btn.classList.remove("selected");
      });

      buttonElement.classList.add("selected");

      setTimeout(() => {
        submitCurrentAnswer();
      }, 250);
    }

    function submitCurrentAnswer() {
      const correctAnswer = quizData[currentQuestion].correct;

      if (selectedAnswer === correctAnswer) {
        score++;
      }

      currentQuestion++;

      if (currentQuestion < quizData.length) {
        showQuestion();
      } else {
        endQuiz();
      }
    }

    function getLevel(scoreValue) {
      if (scoreValue <= 4) return "Niveau débutant";
      if (scoreValue <= 7) return "Niveau intermédiaire";
      return "Niveau avancé";
    }

    function getMessage(scoreValue) {
      if (scoreValue === quizData.length) {
        return "Excellent score. Très bonne maîtrise des fondamentaux.";
      }
      if (scoreValue >= 8) {
        return "Très bon résultat. Vous avez une bonne compréhension de l’IA et de ses limites.";
      }
      if (scoreValue >= 5) {
        return "Résultat solide. Vous avez déjà des bases d’usage.";
      }
      return "Résultat de découverte. Les fondamentaux restent à consolider.";
    }

    function endQuiz() {
      clearInterval(timerInterval);

      document.getElementById("quiz-screen").classList.add("hidden");
      document.getElementById("end-screen").classList.remove("hidden");

      document.getElementById("final-player").textContent = `Merci ${playerName}`;
      document.getElementById("result-score").textContent = `${score} / ${quizData.length}`;
      document.getElementById("result-message").textContent = getMessage(score);
      document.getElementById("result-level").textContent = getLevel(score);
    }

    function restartQuiz() {
      clearInterval(timerInterval);
      document.getElementById("playerName").value = "";
      document.getElementById("launchCode").value = "";
      document.getElementById("end-screen").classList.add("hidden");
      document.getElementById("quiz-screen").classList.add("hidden");
      document.getElementById("start-screen").classList.remove("hidden");
    }
  </script>
</body>
</html>
