<script>
function renderQRCode() {
  const qrBox = document.getElementById('qrcode');
  const qrUrlText = document.getElementById('qrurl');
  if (!qrBox) return;

  let basePath = window.location.pathname;
  if (basePath.endsWith('index.html')) {
    basePath = basePath.replace(/index\.html$/i, '');
  }

  const url = window.location.origin + basePath + '?play=1';
  qrUrlText.textContent = url;

  qrBox.innerHTML = `
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${encodeURIComponent(url)}"
      alt="QR code du quiz"
      width="260"
      height="260"
      style="display:block;border-radius:12px"
      referrerpolicy="no-referrer"
    >
  `;
}
</script>
