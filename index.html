<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🤖 QuizIA — IA</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0f0c29;--c1:#ff6b6b;--c2:#ffd93d;--c3:#6bcb77;--c4:#4d96ff;--white:#fff;--muted:#9ca3d4;--r:18px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);min-height:100vh;color:var(--white)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,#6d28d944 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#1d4ed844 0%,transparent 50%);pointer-events:none;z-index:0}
.pt{position:fixed;border-radius:50%;animation:ptUp linear infinite;pointer-events:none;z-index:0;opacity:.1}
@keyframes ptUp{0%{transform:translateY(110vh) rotate(0)}100%{transform:translateY(-10vh) rotate(720deg)}}
.screen{position:relative;z-index:1;display:none;min-height:100vh;padding:16px;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.screen.active{display:flex;animation:fi .4s ease}
@keyframes fi{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.logo{font-family:'Fredoka One',cursive;font-size:clamp(2rem,8vw,4rem);background:linear-gradient(135deg,var(--c2),var(--c1),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px #ffd93d66);animation:glow 2s ease-in-out infinite;text-align:center;line-height:1.1}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 20px #ffd93d44)}50%{filter:drop-shadow(0 0 45px #ff6b6baa)}}
.sub{font-size:clamp(.85rem,2.8vw,1.1rem);color:var(--muted);font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center}
.pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:50px;padding:6px 14px;font-size:.8rem;font-weight:700;backdrop-filter:blur(10px)}
.fw{width:100%;max-width:420px;display:flex;flex-direction:column;gap:12px}
.flbl{font-weight:800;font-size:.95rem}
input[type=text]{width:100%;padding:14px 16px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:var(--r);color:var(--white);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;outline:none;transition:border-color .3s}
input[type=text]:focus{border-color:var(--c4)}
input[type=text]::placeholder{color:var(--muted)}
.egrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;width:100%}
.ebtn{font-size:1.7rem;padding:8px;border:3px solid transparent;border-radius:12px;background:rgba(255,255,255,.07);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.ebtn:hover{background:rgba(255,255,255,.15);transform:scale(1.15)}
.ebtn.sel{border-color:var(--c2);background:rgba(255,217,61,.2);transform:scale(1.2);box-shadow:0 0 20px rgba(255,217,61,.4)}
.btn{padding:14px 32px;border:none;border-radius:50px;font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;transition:all .2s;letter-spacing:1px;-webkit-tap-highlight-color:transparent}
.bgo{background:linear-gradient(135deg,var(--c4),#7b61ff);color:#fff;box-shadow:0 8px 30px rgba(77,150,255,.4);width:100%}
.bgo:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 12px 40px rgba(77,150,255,.5)}
.bgo:disabled{opacity:.3;cursor:not-allowed}
#sq{justify-content:flex-start;padding-top:14px}
.qh{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.ptag{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border-radius:50px;padding:6px 12px;font-weight:800;font-size:.85rem;white-space:nowrap}
.qcnt{font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--muted)}
.stag{background:linear-gradient(135deg,var(--c2),var(--c1));border-radius:50px;padding:6px 12px;font-family:'Fredoka One',cursive;font-size:.9rem;color:#1a0533;white-space:nowrap}
.tw{width:100%;max-width:700px}
.tbg{width:100%;height:13px;border-radius:50px;background:rgba(255,255,255,.1);overflow:hidden}
