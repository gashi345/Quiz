<script>
const avatars = ['😀','😎','🤖','🦊','🐼','🐸','🦄','🐯','🐱','🐵','🐶','🐨'];
let selectedAvatar = '';
let playerName = '';
let score = 0;
let currentQuestion = 0;
let timer = 15;
let timerInterval = null;
let answered = false;
let correctAnswers = 0;
let wrongAnswers = 0;
let speedBonus = 0;

const questions = [
  {
    icon:'🤖',
    q:'Que signifie IA ?',
    a:['Intelligence artificielle','Interface automatique','Interaction assistée','Internet avancé'],
    c:0,
    e:'IA signifie bien Intelligence artificielle.'
  },
  {
    icon:'🧠',
    q:'Un prompt, c’est…',
    a:['Un bug informatique','Une consigne donnée à l’IA','Un antivirus','Un mot de passe'],
    c:1,
    e:'Un prompt est une instruction donnée à l’IA.'
  },
  {
    icon:'💬',
    q:'ChatGPT est surtout…',
    a:['Un moteur de recherche','Un modèle conversationnel','Un réseau social','Un antivirus'],
    c:1,
    e:'ChatGPT est un modèle conversationnel.'
  },
  {
    icon:'⚠️',
    q:'Une hallucination de l’IA, c’est…',
    a:['Une panne du serveur','Une image floue','Une réponse fausse présentée comme vraie','Un virus'],
    c:2,
    e:'Une hallucination est une information inventée ou erronée.'
  },
  {
    icon:'📊',
    q:'L’IA générative peut aider à…',
    a:['Créer du texte','Créer des images','Synthétiser des documents','Les trois'],
    c:3,
    e:'Elle peut faire les trois.'
  },
  {
    icon:'🔍',
    q:'Pour de meilleurs résultats, un prompt doit être…',
    a:['Le plus vague possible','Court et flou','Précis et contextualisé','Écrit en majuscules'],
    c:2,
    e:'Plus le prompt est précis, meilleur est le résultat.'
  },
  {
    icon:'📁',
    q:'L’IA peut-elle se tromper ?',
    a:['Jamais','Oui, parfois','Seulement la nuit','Uniquement sur mobile'],
    c:1,
    e:'Oui, l’IA peut se tromper.'
  },
  {
    icon:'⚖️',
    q:'Avec l’IA, il faut particulièrement faire attention à…',
    a:['La couleur de l’écran','La confidentialité des données','La batterie','Le Wi-Fi uniquement'],
    c:1,
    e:'La confidentialité des données est un point majeur.'
  },
  {
    icon:'🛠️',
    q:'L’IA remplace totalement l’humain ?',
    a:['Oui, toujours','Non, elle l’assiste','Seulement dans les écoles','Seulement le week-end'],
    c:1,
    e:'L’IA assiste, mais ne remplace pas totalement l’humain.'
  },
  {
    icon:'🚀',
    q:'La meilleure posture face à l’IA est…',
    a:['Ne jamais l’utiliser','Tout croire sans vérifier','Tester, vérifier, encadrer','La laisser décider seule'],
    c:2,
    e:'Il faut tester, vérifier et encadrer l’usage.'
  }
];

function makeParticles() {
  const container = document.getElementById('ptcls');
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    const s = Math.random() * 14 + 6;
    p.style.width = s + 'px';
    p.style.height = s + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (Math.random() * 12 + 10) + 's';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.background = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff'][Math.floor(Math.random() * 4)];
    container.appendChild(p);
  }
}

function renderAvatars() {
  const grid = document.getElementById('egrid');
  grid.innerHTML = '';
  avatars.forEach(av => {
    const b = document.createElement('button');
    b.className = 'ebtn';
    b.type = 'button';
    b.textContent = av;
    b.onclick = () => {
      document.querySelectorAll('.ebtn').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      selectedAvatar = av;
      updateStartButton();
    };
    grid.appendChild(b);
  });
}

function updateStartButton() {
  const name = document.getElementById('pname').value.trim();
  document.getElementById('sbtn').disabled = !(name && selectedAvatar);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function gohome() {
  showScreen('sh');
}

function begin() {
  playerName = document.getElementById('pname').value.trim();
  if (!playerName || !selectedAvatar) return;

  score = 0;
  currentQuestion = 0;
  correctAnswers = 0;
  wrongAnswers = 0;
  speedBonus = 0;

  document.getElementById('he').textContent = selectedAvatar;
  document.getElementById('hn').textContent = playerName;
  document.getElementById('hs').textContent = score;

  showScreen('sq');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[currentQuestion];

  document.getElementById('qcnt').textContent = `Q ${currentQuestion + 1} / ${questions.length}`;
  document.getElementById('qico').textContent = q.icon;
  document.getElementById('qt').textContent = q.q;
  document.getElementById('a0').textContent = q.a[0];
  document.getElementById('a1').textContent = q.a[1];
  document.getElementById('a2').textContent = q.a[2];
  document.getElementById('a3').textContent = q.a[3];

  document.querySelectorAll('.ab').forEach(b => {
    b.disabled = false;
    b.classList.remove('ok','ko','rvc');
  });

  const fb = document.getElementById('fb');
  fb.className = 'fb';
  fb.style.display = 'none';
  fb.textContent = '';

  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timer = 15;
  updateTimerUI();

  timerInterval = setInterval(() => {
    timer--;
    updateTimerUI();

    if (timer <= 0) {
      clearInterval(timerInterval);
      timeOut();
    }
  }, 1000);
}

function updateTimerUI() {
  document.getElementById('tn').textContent = timer;
  document.getElementById('tf').style.width = (timer / 15 * 100) + '%';
}

function pick(index) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const q = questions[currentQuestion];
  const buttons = document.querySelectorAll('.ab');
  buttons.forEach(b => b.disabled = true);

  if (index === q.c) {
    buttons[index].classList.add('ok');
    correctAnswers++;
    const bonus = timer;
    speedBonus += bonus;
    score += 100 + bonus;
    document.getElementById('hs').textContent = score;

    const fb = document.getElementById('fb');
    fb.textContent = `✅ Bonne réponse ! +${100 + bonus} points`;
    fb.className = 'fb ok';
  } else {
    buttons[index].classList.add('ko');
    buttons[q.c].classList.add('rvc');
    wrongAnswers++;

    const fb = document.getElementById('fb');
    fb.textContent = `❌ ${q.e}`;
    fb.className = 'fb ko';
  }

  setTimeout(nextQuestion, 1800);
}

function timeOut() {
  if (answered) return;
  answered = true;

  const q = questions[currentQuestion];
  const buttons = document.querySelectorAll('.ab');
  buttons.forEach(b => b.disabled = true);
  buttons[q.c].classList.add('rvc');
  wrongAnswers++;

  const fb = document.getElementById('fb');
  fb.textContent = `⏰ Temps écoulé ! ${q.e}`;
  fb.className = 'fb ko';

  setTimeout(nextQuestion, 1800);
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= questions.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

function showResults() {
  showScreen('sr');

  document.getElementById('rname').textContent = `${selectedAvatar} ${playerName}`;
  document.getElementById('rscore').textContent = score;
  document.getElementById('rok').textContent = `${correctAnswers}/${questions.length}`;
  document.getElementById('rko').textContent = `${wrongAnswers}/${questions.length}`;
  document.getElementById('rbon').textContent = `+${speedBonus}`;
  document.getElementById('rtot').textContent = score;

  const medal = document.getElementById('rmed');
  const trophy = document.getElementById('rtr');

  if (score >= 950) {
    medal.textContent = '🥇 Expert IA';
    medal.style.background = 'linear-gradient(135deg,#ffd93d,#ffb703)';
    medal.style.color = '#2d1600';
    trophy.textContent = '👑';
  } else if (score >= 700) {
    medal.textContent = '🥈 Très bon score';
    medal.style.background = 'linear-gradient(135deg,#dfe7ef,#adb5bd)';
    medal.style.color = '#1f2937';
    trophy.textContent = '🏆';
  } else {
    medal.textContent = '🥉 Bien joué';
    medal.style.background = 'linear-gradient(135deg,#f4a261,#e76f51)';
    medal.style.color = '#fff';
    trophy.textContent = '🎉';
  }
}

function restart() {
  showScreen('sqr');
}

function renderQRCode() {
  const qrBox = document.getElementById('qrcode');
  const qrUrlText = document.getElementById('qrurl');

  // URL du quiz sur GitHub Pages
  const url = window.location.origin + window.location.pathname + '?play=1';

  qrUrlText.textContent = url;

  const img = document.createElement('img');
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(url);
  img.alt = 'QR code du quiz';
  img.width = 220;
  img.height = 220;
  img.loading = 'eager';

  img.onerror = function () {
    qrBox.innerHTML = '<p style="color:#111;font-weight:800;padding:20px;text-align:center">QR code indisponible</p>';
  };

  qrBox.innerHTML = '';
  qrBox.appendChild(img);
}

document.getElementById('pname').addEventListener('input', updateStartButton);

makeParticles();
renderAvatars();
renderQRCode();

// Si quelqu’un ouvre le lien avec ?play=1, on va directement à l’écran d’accueil
if (window.location.search.includes('play=1')) {
  gohome();
}
</script>
