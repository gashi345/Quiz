<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz IA</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{font-family:Nunito;background:#111;color:#fff;text-align:center}
.screen{display:none}
.screen.active{display:block}
#qrcode{background:#fff;padding:12px;border-radius:12px;display:inline-block;margin:10px}
button{padding:10px 20px;margin:10px;border:none;border-radius:10px;background:#4d96ff;color:#fff;font-weight:700;cursor:pointer}
</style>
</head>

<body>

<div id="sqr" class="screen active">
  <h1>🤖 Quiz IA</h1>
  <p>Scanne pour participer</p>
  <div id="qrcode"></div>
  <p id="qrurl"></p>
  <button onclick="gohome()">Jouer</button>
</div>

<div id="sh" class="screen">
  <input id="pname" placeholder="Ton prénom">
  <button onclick="begin()">Start</button>
</div>

<div id="sq" class="screen">
  <h2 id="qt"></h2>
  <div id="answers"></div>
</div>

<div id="sr" class="screen">
  <h2 id="result"></h2>
  <p id="level"></p>
  <button onclick="restart()">Rejouer</button>
</div>

<script>
let current = 0;
let score = 0;

const questions = [
  {e:"🤖",t:"Qu'est-ce que l'intelligence artificielle (IA) ?",a:[
  "Robot humain","Techniques imitant l’intelligence","OS","Base RH"],c:1},
  {e:"💬",t:"Que permet un assistant IA ?",a:[
  "Automatiser tout","Répondre à des demandes","Évaluer agents","Créer algo"],c:1},
  {e:"🚀",t:"Différence assistant vs agent IA ?",a:[
  "Prix","Autonome vs exécutant","Illégal","Aucune"],c:1},
  {e:"✍️",t:"Prompting ?",a:[
  "Logiciel","IA seule","Instructions à IA","Analyse données"],c:2},
  {e:"🌀",t:"Hallucination IA ?",a:[
  "Bug","Prédiction exacte","Réponse fausse crédible","Illégal"],c:2},
  {e:"📅",t:"IA générative depuis ?",a:["2000","2010","2018","2022"],c:3},
  {e:"⚖️",t:"AI Act RH ?",a:[
  "Interdit","Risque élevé","Limité","Minimal"],c:1},
  {e:"🗓️",t:"IA interdites date ?",a:[
  "2024","2025","2026","2027"],c:1},
  {e:"🔄",t:"Usage augmentatif ?",a:[
  "Remplace RH","Décide seul","Aide humain","Automatique"],c:2},
  {e:"🌱",t:"Nouveau métier IA ?",a:[
  "Numérique","Éthicien IA","Blockchain","Postal"],c:1}
];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function gohome(){show('sh')}

function begin(){
  current=0;score=0;
  show('sq');
  loadQ();
}

function loadQ(){
  let q=questions[current];
  document.getElementById('qt').innerText=q.t;

  let div=document.getElementById('answers');
  div.innerHTML='';

  q.a.forEach((ans,i)=>{
    let b=document.createElement('button');
    b.innerText=ans;
    b.onclick=()=>answer(i);
    div.appendChild(b);
  });
}

function answer(i){
  if(i===questions[current].c) score++;
  current++;
  if(current>=questions.length) end();
  else loadQ();
}

function end(){
  show('sr');
  document.getElementById('result').innerText="Score : "+score+"/10";

  let txt="";
  if(score>=9) txt="Maîtrise — reste en veille, continue d’explorer.";
  else if(score>=6) txt="Intermédiaire — continue à explorer en promptant chaque jour.";
  else txt="Débutant — continue d’explorer.";

  document.getElementById('level').innerText=txt;
}

function restart(){show('sqr');renderQR();}

function renderQR(){
  let base = window.location.href.split('?')[0];
  let url = base + "?play=1";

  document.getElementById('qrurl').innerText=url;

  document.getElementById('qrcode').innerHTML =
    '<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data='
    + encodeURIComponent(url) + '">';
}

renderQR();

if(window.location.search.includes("play=1")) gohome();
</script>

</body>
</html>
